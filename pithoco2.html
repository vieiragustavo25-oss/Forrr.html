<!DOCTYPE html>
<html>
<body>
<h1>Tabuada do 5</h1>

<p id="demo"></p>

<script>
const numero = 
["5 x 1 = 5",
"5 x 2 = 10",
"5 x 3 = 15",
"5 x 4 = 20",
"5 x 5 = 25",
"5 x 6 = 30",
"5 x 7 = 35",
"5 x 8 = 40",
"5 x 9 = 45",
"5 x 10 = 50"];
let len = numero.length;

let text = "";
for (let i = 0; i < len; i++) {
  text += numero[i] + "<br>";
}

document.getElementById("demo").innerHTML = text;
</script>

</body>
</html>
